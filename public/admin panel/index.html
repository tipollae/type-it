<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>co-code.net</title>

    <link rel="stylesheet" href="../styling/admin panel.css">
    <link rel="stylesheet" href="../styling/basics.css"> 
    <link rel="icon" type="image/svg+xml" sizes="any" href="../images/co code favicon svg.svg">

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

</head>
<body>

    <div id = "container">

        <div id = "frontPageLoader" class = "loader"></div>

        <div id = "fakeConsoleContainer">

            <div id = "tabsContainer">

                <div class = "tabButton active">Admin.py</div>

            </div>

            <div id = "fakeConsole" onclick = "focusInput()">
                <div id = "logoContainer">co-code.net <img id = "logo" src="../images/co-code logo.png"
                style = "margin-left: 20px" alt="co-code.net logo"></div>
                <br><br><br><br><br>
            </div>

        </div>

    </div>

    <div id = "panelDisplay">

        <p id = "usersLength" style = "margin-left: 20px">Users in memory: </p>
        <p id = "roomsLength" style = "margin-left: 20px">Active rooms: </p>

        <div id = "refreshButton" onclick = "requestNewData()">Refresh 🗘</div>

        <div id = "roomsDisplay">

        </div>

    </div>

    <h1 id = "messageDisplay"></h1>

    <script type = "text/javascript" src = "/socket.io/socket.io.js"></script>
    <script type = "text/javascript" src = "../scripts/admin panel.js"></script>

</body>
</html>
