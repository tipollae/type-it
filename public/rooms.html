<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>co-code.net</title>

    <link rel="stylesheet" href="styling/rooms.css">
    <link rel="stylesheet" href="styling/basics.css"> 
    <link rel="icon" type="image/svg+xml" sizes="any" href="images/co code favicon svg.svg">

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

</head>
<body>

    <div id = "container">

        <div id = "frontPageLoader" class = "loader"></div>

        <div id = "fakeConsoleContainer">

            <div id = "tabsContainer">

                <div class = "tabButton active">Rooms.py</div>
                <div id = "createRoom" class = "tabButton" onclick = "createRoomPrompt()" style = "margin-left: 20px">Create room</div>
                <div id = "logout" onclick = "logOutPrompt()" style = "margin-left: 20px">Logout</div>

            </div>

            <div id = "fakeConsole" onclick = "focusInput()">
                <div id = "logoContainer">co-code.net <img id = "logo" src="images/co-code logo.png"
                style = "margin-left: 20px" alt="co-code.net logo"></div>
                <br><br><br><br><br>
            </div>

        </div>

    </div>

    <div id = "createRoomBlurr">

        <div id = "creatingRoomText" class = "normalText">Creating room...</div>
        
    </div>

    <h1 id = "messageDisplay"></h1>

    <script>

        const buttons = document.querySelectorAll(".tabButton");

        buttons.forEach(btn => {
            btn.addEventListener("click", () => {

                // remove active from all
                buttons.forEach(b => b.classList.remove("active"));

                // add to clicked one
                btn.classList.add("active");
            });
        });

    </script>

    <script type = "text/javascript" src = "/socket.io/socket.io.js"></script>
    <script type = "text/javascript" src = "scripts/clientSocketBasics.js"></script>
    <script type = "text/javascript" src = "scripts/rooms.js"></script>

</body>
</html>
