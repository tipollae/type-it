<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding coco</title>

    <link rel="stylesheet" href="styling/rooms.css">
    <link rel="stylesheet" href="styling/basics.css"> 

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

</head>
<body>

    <div id = "container">

        <div id = "frontPageLoader" class = "loader"></div>

        <div id = "fakeConsoleContainer">

            <div id = "tabsContainer">

                <div class = "tabButton active">Rooms.py</div>
                <div id = "createRoom" class = "tabButton" style = "margin-left: 20px">Create room</div>
                <div id = "about" class = "tabButton" style = "margin-left: 20px">About</div>
                <div id = "logout" style = "margin-left: 20px">Logout</div>

            </div>

            <div id = "fakeConsole" onclick = "focusInput()">
                <br>
            </div>

        </div>

    </div>

    <script>

        const buttons = document.querySelectorAll(".tabButton");

        buttons.forEach(btn => {
            btn.addEventListener("click", () => {

                // remove active from all
                buttons.forEach(b => b.classList.remove("active"));

                // add to clicked one
                btn.classList.add("active");
            });
        });

    </script>

    <script type = "text/javascript" src = "/socket.io/socket.io.js"></script>
    <script type = "text/javascript" src = "scripts/clientSocketBasics.js"></script>
    <script type = "text/javascript" src = "scripts/rooms.js"></script>

</body>
</html>
