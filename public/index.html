<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="co-code.net is a multiplayer Python coding platform where users can write, run, and share Python code together in real time.">

    <meta property="og:title" content="co-code.net - Multiplayer Python Compiler">
    <meta property="og:description" content="Code Python together online with live rooms, shared code panels, and browser-based execution.">
    <meta property="og:image" content="https://co-code.net/images/co-code%20logo.png">
    <meta property="og:url" content="https://co-code.net">
    <meta property="og:type" content="website">
    <title>co-code.net</title>

    <link rel="stylesheet" href="styling/style.css">
    <link rel="stylesheet" href="styling/basics.css">
    <link rel="icon" type="image/png" sizes="48x48" href="images/co code logo 48x48.png">
    <link rel="icon" type="image/svg+xml" sizes="any" href="images/co code favicon svg.svg">

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

</head>
<body>

    <div id = "container">

        <div id = "frontPageLoader" class = "loader"></div>

        <div id = "fakeConsoleContainer">

            <div id = "tabsContainer">

                <div class = "tabButton active">Login.py</div>
                <div id = "about" class = "tabButton" onclick = "window.open('/about')" style = "margin-left: 20px">About</div>

            </div>

            <div id = "fakeConsole" onclick = "focusInput()">
                <div id = "logoContainer">co-code.net <img id = "logo" src="images/co-code logo.png"
                style = "margin-left: 20px"></div>
                <br><br><br><br><br>
            </div>

        </div>

    </div>

    <h1 id = "messageDisplay"></h1>

    <script type = "text/javascript" src = "/socket.io/socket.io.js"></script>
    <script type = "text/javascript" src = "scripts/clientSocketBasics.js"></script>
    <script type = "text/javascript" src = "scripts/script.js"></script>

</body>
</html>
